; ============================================================================
; LLM Query System — Endpoint Configuration Template
; ============================================================================
;
; PURPOSE
;   This file tells the LLM Query System which AI service to call, how to
;   reach it, what model to use, and how to format the request.
;
; HOW TO USE
;   1. Copy this file and rename it (e.g. my_ollama.ini, my_sd.ini).
;   2. Fill in the values for your service (see the comments for each key).
;   3. Load the file in the GUI with the "Browse…" button next to "Config File".
;
; FORMAT
;   Standard INI file.  Lines that start with ; or # are comments and are
;   ignored.  Inline comments (after a value on the same line) are also
;   supported.
;
; SECTIONS
;   [service]    — which service and what kind of output it produces
;   [endpoint]   — the HTTP URL to send the request to
;   [model]      — which AI model to use (LLM / TTS services)
;   [request]    — how to format the request body
;   [parameters] — service-specific tuning parameters
;
; ============================================================================


; ── [service] ─────────────────────────────────────────────────────────────────
[service]

; name  (required)
;   Identifies which AI service this config targets.
;   The system uses this to choose the correct request payload structure and
;   to auto-detect the request format when [request] format = auto.
;
;   Supported values
;   ────────────────
;   llama_cpp         llama.cpp local inference server
;                       (https://github.com/ggerganov/llama.cpp)
;   ollama            Ollama runner
;                       (https://ollama.com)
;   chatterbox        ResembleAI Chatterbox TTS
;                       (https://github.com/resemble-ai/chatterbox)
;   coqui_tts         Coqui-AI TTS server
;                       (https://github.com/coqui-ai/TTS)
;   stable_diffusion  AUTOMATIC1111 Stable Diffusion WebUI
;                       (https://github.com/AUTOMATIC1111/stable-diffusion-webui)
;
name = ollama

; type  (required)
;   Determines how the API response is interpreted and saved.
;
;   Supported values
;   ────────────────
;   llm    Text generation / chat.  Response is saved as a .txt file.
;   tts    Text-to-speech.  Response audio is saved as .wav / .mp3 / .ogg.
;   image  Image generation.  Response image(s) are saved as .png files.
;
type = llm


; ── [endpoint] ────────────────────────────────────────────────────────────────
[endpoint]

; url  (required)
;   The full HTTP URL (including path) of the API endpoint to POST to.
;
;   Common examples
;   ───────────────
;   llama.cpp (completion API)       : http://localhost:8080/completion
;   llama.cpp (OpenAI-compat chat)   : http://localhost:8080/v1/chat/completions
;   Ollama (generate)                : http://localhost:11434/api/generate
;   Ollama (chat)                    : http://localhost:11434/api/chat
;   Chatterbox TTS                   : http://localhost:8004/generate
;   Coqui-TTS                        : http://localhost:5002/api/tts
;   Stable Diffusion AUTOMATIC1111   : http://localhost:7860/sdapi/v1/txt2img
;
url = http://localhost:11434/api/generate


; ── [model] ───────────────────────────────────────────────────────────────────
[model]

; name  (optional — leave blank if not required by the service)
;   The model identifier to include in the request payload.
;
;   Examples
;   ────────
;   Ollama           : llama3, mistral, phi3, qwen2, gemma2
;   llama.cpp        : (leave blank — model is selected at server start-up)
;   Stable Diffusion : checkpoint filename without extension, e.g. v1-5-pruned
;   Coqui-TTS        : (leave blank for the server's default voice)
;
name = llama3


; ── [request] ─────────────────────────────────────────────────────────────────
[request]

; format  (optional — default: auto)
;   Controls how the HTTP request body is formatted.
;
;   auto  Let the system decide based on [service] name (recommended).
;         All built-in services use JSON by default.
;   json  Send a structured JSON payload (Content-Type: application/json).
;         This is what most modern AI APIs expect.
;   text  Send the raw prompt as plain text (Content-Type: text/plain).
;         Sometimes called "toon" format.  Use this only if the API
;         explicitly requires a plain-text body.
;
format = auto


; ── [parameters] ──────────────────────────────────────────────────────────────
;
; Service-specific tuning parameters.
; Parameters that do not apply to the selected service are silently ignored.
;
[parameters]

; ─── LLM parameters (llama_cpp, ollama) ───────────────────────────────────────

; max_tokens
;   Maximum number of tokens the model will generate in a single response.
;   Higher values allow longer answers but take more time.
;   Range: 1 – context window size (depends on model)
max_tokens = 512

; temperature
;   Sampling temperature.  Controls randomness / creativity.
;   0.0  → deterministic (always picks the most likely token)
;   0.7  → balanced (recommended default)
;   1.0  → creative / varied output
;   >1.0 → increasingly random / chaotic
temperature = 0.7

; stream
;   Whether to receive the response token-by-token as it is generated.
;   Note: streaming is not supported in the current GUI version; set to false.
;   true | false
stream = false

; stop
;   JSON array of strings that will cause generation to stop early.
;   Leave blank (or comment out) to use the model's default stopping criteria.
;   Example:  stop = ["</s>", "Human:", "###"]
; stop =

; ─── Stable Diffusion parameters ──────────────────────────────────────────────

; negative_prompt
;   Concepts, styles, or artefacts to avoid in the generated image.
negative_prompt = ugly, blurry, low quality, watermark, signature

; steps
;   Number of denoising steps.  More steps → higher quality but slower.
;   Typical range: 15 – 50
steps = 20

; width / height
;   Output image dimensions in pixels.  Must be a multiple of 8.
;   Common values: 512×512, 768×768, 1024×1024
width = 512
height = 512

; cfg_scale
;   Classifier-Free Guidance scale.  How strictly the image follows the prompt.
;   Low  (1–4)   → more creative freedom
;   Mid  (7–10)  → good balance (recommended default)
;   High (15–30) → very literal, can over-saturate
cfg_scale = 7.0

; sampler_name
;   Diffusion sampler algorithm.
;   Examples: Euler a, Euler, DPM++ 2M Karras, DDIM, LMS
sampler_name = Euler a

; batch_size
;   Number of images to generate in a single request.
batch_size = 1

; seed
;   Random seed for reproducibility.  -1 picks a random seed each time.
seed = -1

; ─── Coqui-TTS parameters ─────────────────────────────────────────────────────

; speaker_id
;   Speaker voice identifier (leave blank to use the server's default voice).
speaker_id =

; language_id
;   Language code (e.g. en, de, fr, es).  Leave blank for the default.
language_id =

; style_wav
;   Path to a reference audio file for voice cloning (Coqui-TTS YourTTS / XTTS).
;   Leave blank if not using voice cloning.
style_wav =

; ─── Chatterbox TTS parameters ────────────────────────────────────────────────

; exaggeration
;   Emotion exaggeration factor.  Range: 0.0 (neutral) – 1.0 (very expressive).
exaggeration = 0.5

; cfg_weight
;   Chatterbox CFG guidance weight.  Range: 0.0 – 1.0
cfg_weight = 0.5
